<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Availability — Survey</title>
<style>
  :root{
    --ink:#1a2b1f; --paper:#f6f4ec; --line:#d9d4c4; --soft:#eceadf;
    --accent:#2f7d4f; --accent-d:#1f5e3a; --muted:#6b7264; --warn:#b4452f;
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--paper); color:var(--ink);
    font-family:"DejaVu Sans","Segoe UI",system-ui,sans-serif; line-height:1.45; padding:20px;}
  .wrap{max-width:780px; margin:0 auto}
  header{border-bottom:2px solid var(--ink); padding-bottom:12px; margin-bottom:20px}
  .eyebrow{font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--muted)}
  h1{margin:4px 0 0; font-size:24px; font-weight:800; letter-spacing:-.01em}
  label{display:block; font-size:12px; font-weight:700; text-transform:uppercase;
        letter-spacing:.06em; color:var(--muted); margin-bottom:5px}
  input{width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:7px;
    background:#fff; font-size:15px; color:var(--ink); font-family:inherit;}
  input:focus{outline:2px solid var(--accent); outline-offset:1px; border-color:var(--accent)}
  .card{background:#fff; border:1px solid var(--line); border-radius:10px; padding:16px; margin-bottom:16px}
  .ac{position:relative}
  .ac-list{position:absolute; z-index:30; left:0; right:0; top:calc(100% + 3px);
    background:#fff; border:1px solid var(--line); border-radius:8px; max-height:240px;
    overflow-y:auto; box-shadow:0 8px 24px rgba(0,0,0,.12); display:none}
  .ac-list.open{display:block}
  .ac-item{padding:9px 12px; font-size:14px; cursor:pointer; border-bottom:1px solid var(--soft)}
  .ac-item:last-child{border-bottom:none}
  .ac-item:hover,.ac-item.active{background:var(--soft)}
  .ac-item .hl{color:var(--accent-d); font-weight:700}
  .ac-empty{padding:10px 12px; font-size:13px; color:var(--muted); font-style:italic}
  .field{margin-bottom:14px}
  .field:last-child{margin-bottom:0}
  .head-row{display:grid; grid-template-columns:1fr 90px 40px; gap:10px; font-size:11px;
    text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:4px}
  .row{display:grid; grid-template-columns:1fr 90px 40px; gap:10px; align-items:start; margin-bottom:10px}
  .row .x{border:1px solid var(--line); background:#fff; border-radius:7px; height:42px;
    cursor:pointer; font-size:18px; color:var(--warn);}
  .addbtn{background:none; border:1px dashed var(--accent); color:var(--accent-d);
    padding:10px 14px; border-radius:7px; cursor:pointer; font-weight:700; font-size:14px; width:100%}
  .submit{background:var(--accent); color:#fff; border:none; padding:14px; border-radius:8px;
    font-size:16px; font-weight:800; cursor:pointer; width:100%; letter-spacing:.02em}
  .submit:hover{background:var(--accent-d)}
  .submit:disabled{opacity:.55; cursor:wait}
  .hint{font-size:12px; color:var(--muted); margin-top:6px}
  .status{padding:11px 14px; border-radius:8px; font-size:14px; margin-top:14px; display:none}
  .status.ok{display:block; background:#e6f2ea; color:var(--accent-d); border:1px solid #b9dcc6}
  .status.err{display:block; background:#f7e7e2; color:var(--warn); border:1px solid #e3bfb4}
  @media(max-width:560px){.head-row,.row{grid-template-columns:1fr 70px 40px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Field Survey</div>
    <h1>Stock Availability</h1>
  </header>

  <div class="card">
    <div class="field ac">
      <label for="cust">Customer (code &amp; name)</label>
      <input id="cust" autocomplete="off" placeholder="Type code or name…">
      <div class="ac-list" id="custList"></div>
      <div class="hint">Start typing — pick from the list, or type your own.</div>
    </div>
    <div class="field ac">
      <label for="sr">SR Name</label>
      <input id="sr" autocomplete="off" placeholder="Auto-fills when you pick a customer">
      <div class="ac-list" id="srList"></div>
    </div>
  </div>

  <div class="card">
    <label style="margin-bottom:10px">SKU Lines</label>
    <div class="head-row"><span>Material / SKU</span><span>Qty</span><span></span></div>
    <div id="rows"></div>
    <button class="addbtn" id="add">+ Add SKU line</button>
  </div>

  <button class="submit" id="submit">Submit</button>
  <div class="status" id="status"></div>

function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function highlight(text, q){
  if(!q) return esc(text);
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if(i<0) return esc(text);
  return esc(text.slice(0,i))+'<span class="hl">'+esc(text.slice(i,i+q.length))+'</span>'+esc(text.slice(i+q.length));
}

// Generic autocomplete: input + list element + source(query)->[{label,value,meta}]
function attachAC(input, list, source, onPick){
  let active = -1, items = [];
  function render(q){
    items = source(q).slice(0,50);
    if(!items.length){ list.innerHTML = '<div class="ac-empty">No match — your typed text will be used.</div>'; list.classList.add('open'); active=-1; return; }
    list.innerHTML = items.map((it,idx)=>'<div class="ac-item" data-i="'+idx+'">'+highlight(it.label,q)+'</div>').join('');
    list.classList.add('open'); active=-1;
  }
  input.addEventListener('input', ()=>render(input.value.trim()));
  input.addEventListener('focus', ()=>{ if(input.value.trim()!=='' || source('').length) render(input.value.trim()); });
  input.addEventListener('keydown', e=>{
    const els = [...list.querySelectorAll('.ac-item')];
    if(e.key==='ArrowDown'){ e.preventDefault(); active=Math.min(active+1,els.length-1); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); active=Math.max(active-1,0); }
    else if(e.key==='Enter'){ if(active>=0 && items[active]){ e.preventDefault(); choose(items[active]); } return; }
    else if(e.key==='Escape'){ list.classList.remove('open'); return; }
    els.forEach((el,i)=>el.classList.toggle('active',i===active));
    if(els[active]) els[active].scrollIntoView({block:'nearest'});
  });
  list.addEventListener('mousedown', e=>{
    const el = e.target.closest('.ac-item'); if(!el) return;
    e.preventDefault(); choose(items[+el.dataset.i]);
  });
  input.addEventListener('blur', ()=>setTimeout(()=>list.classList.remove('open'),150));
  function choose(it){ input.value = it.value; list.classList.remove('open'); if(onPick) onPick(it); }
}

  document.getElementById('cust'),
  document.getElementById('custList'),
  q=>{ const s=q.toLowerCase();
    return (s? customers.filter(c=>c.c.toLowerCase().includes(s)) : customers)
      .map(c=>({label:c.c, value:c.c, meta:c.s})); },
  it=>{ if(it.meta) document.getElementById('sr').value = it.meta; }
);
// SR source
attachAC(
  document.getElementById('sr'),
  document.getElementById('srList'),
  q=>{ const s=q.toLowerCase();
    return (s? srs.filter(x=>x.toLowerCase().includes(s)) : srs).map(x=>({label:x,value:x})); }
);

// SKU rows
const rows = document.getElementById('rows');
function matSource(q){ const s=q.toLowerCase();
  return (s? materials.filter(m=>m.toLowerCase().includes(s)) : materials).map(m=>({label:m,value:m})); }
function addRow(){
  const div = document.createElement('div');
  div.className='row';
  div.innerHTML = '<div class="ac"><input class="sku" autocomplete="off" placeholder="Type or pick a material…"><div class="ac-list skuList"></div></div>'
    + '<input class="qty" type="number" min="0" placeholder="0">'
    + '<button class="x" title="Remove">×</button>';
  rows.appendChild(div);
  attachAC(div.querySelector('.sku'), div.querySelector('.skuList'), matSource);
  div.querySelector('.x').onclick = ()=>div.remove();
}
addRow(); addRow();
document.getElementById('add').onclick = addRow;

// Submit
const statusEl = document.getElementById('status');
document.getElementById('submit').onclick = async (e)=>{
  const btn = e.target;
  const cust = document.getElementById('cust').value.trim();
  const sr = document.getElementById('sr').value.trim();
  if(!cust){ statusEl.className='status err'; statusEl.textContent='Customer is required.'; return; }
  const items = [...rows.querySelectorAll('.row')].map(r=>({
    sku:r.querySelector('.sku').value.trim(),
    qty:Number(r.querySelector('.qty').value)||0
  })).filter(i=>i.sku);
  if(!items.length){ statusEl.className='status err'; statusEl.textContent='Add at least one SKU line.'; return; }
  const payload={customer:cust, sr:sr, items:items, submittedAt:new Date().toISOString()};
  const url = document.getElementById('endpoint').value.trim();
  if(!url){ console.log('SUBMISSION', payload);
    statusEl.className='status ok'; statusEl.textContent='Demo: '+items.length+' line(s) logged to console for '+cust+'.'; return; }
  btn.disabled=true; statusEl.className='status'; statusEl.style.display='block'; statusEl.textContent='Sending…';
  try{ await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    statusEl.className='status ok'; statusEl.textContent='✓ Submitted '+items.length+' line(s) for '+cust+'. Saved to Google Sheet.';
    document.getElementById('cust').value=''; document.getElementById('sr').value='';
    rows.innerHTML=''; addRow(); addRow();
    window.scrollTo({top:0,behavior:'smooth'});
  }catch(err){ statusEl.className='status err'; statusEl.textContent='Failed: '+err.message; }
  finally{ btn.disabled=false; }
};
</script>
</body>
</html>
